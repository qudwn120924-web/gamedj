  var EXROW_KEY = '__exrow';
  var exRow = (RVSTAT[EXROW_KEY] && RVSTAT[EXROW_KEY].rows) ? RVSTAT[EXROW_KEY].rows : {};
  h += '<tr style="background:#F8FAFC">';
  h += '<td style="padding:6px;border:1px solid #BFDBFE;text-align:center;font-size:9px;font-weight:700;color:#94A3B8;background:#F1F5F9;border-left:3px solid #CBD5E1">예시</td>';
  h += '<td style="padding:6px 8px;border:1px solid #BFDBFE;font-size:10px;color:#94A3B8;white-space:nowrap;background:#F1F5F9">ex. 홍길동</td>';
  WEEK_LABELS.forEach(function(wk) {
    var exVal = exRow[wk] || '';
    var safeEx = exVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h += '<td style="padding:3px 4px;border:1px solid #BFDBFE;vertical-align:top;width:130px;background:#F1F5F9">';
    h += '<textarea placeholder="예시 입력..." rows="3" spellcheck="false" data-wk="'+wk+'"';
    h += ' onblur="W._rvExRow(this.dataset.wk,this.value)"';
    h += ' style="width:100%;font-size:10px;padding:3px 5px;border:1px solid #E2E8F0;border-radius:4px;background:#fff;outline:none;color:#374151;resize:vertical;font-family:inherit;line-height:1.5;box-sizing:border-box">';
    h += safeEx+'</textarea></td>';
  });
  h += '<td style="padding:4px 6px;border:1px solid #FECACA;text-align:center;vertical-align:middle;background:#FEF2F2">';
  h += '<input value="'+(RVSTAT[EXROW_KEY]&&RVSTAT[EXROW_KEY].total||'')+'" placeholder="0"';
  h += ' onblur="W._rvExTotal(this.value)"';
  h += ' style="width:36px;font-size:12px;font-weight:900;text-align:center;border:1px solid #FECACA;border-radius:4px;padding:3px 2px;background:transparent;outline:none;color:#DC2626">';
  h += '</td></tr>';

  TM_CFG.forEach(function(team) {
    var tData = mData[team.name] || {};
    var memberCount = team.members.length;

    team.members.forEach(function(member, mi) {
      var mbrData = tData[member] || {};
      var manualTotal = mbrData.__total || '';
      var teamBg = team.color+'18';

      h += '<tr>';
      if (mi === 0) {
        h += '<td rowspan="'+memberCount+'" style="padding:6px;border:1px solid #BFDBFE;text-align:center;font-weight:900;font-size:11px;color:'+team.color+';background:'+teamBg+';border-left:3px solid '+team.color+'">'+team.name+'</td>';
      }
      h += '<td style="padding:6px 8px;border:1px solid #BFDBFE;font-weight:600;font-size:11px;white-space:nowrap;background:var(--bg)">'+member+'</td>';

      WEEK_LABELS.forEach(function(wk) {
        var saved = mbrData[wk];
        var textVal = Array.isArray(saved) ? saved.filter(Boolean).join('\n')
                    : (typeof saved === 'string' ? saved : '');
        var filled = !!textVal.trim();
        var bdColor = filled ? '#86EFAC' : '#BFDBFE';
        var bgColor = filled ? '#F0FDF4' : 'var(--bg)';
        var safeVal = textVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        h += '<td style="padding:3px 4px;border:1px solid #BFDBFE;vertical-align:top;width:130px">';
        h += '<textarea placeholder="내용 입력" rows="3" spellcheck="false"';
        h += ' style="width:100%;font-size:10px;padding:3px 5px;border:1px solid '+bdColor+';border-radius:4px;background:'+bgColor+';outline:none;color:#374151;resize:vertical;font-family:inherit;line-height:1.5;box-sizing:border-box"';
        h += ' onblur="W._rvText(\''+mKey+'\',\''+team.name+'\',\''+member+'\',\''+wk+'\',this.value)"';
        h += ' oninput="this.style.borderColor=this.value.trim()?\'#86EFAC\':\'#BFDBFE\';this.style.background=this.value.trim()?\'#F0FDF4\':\'var(--bg)\'">';
        h += safeVal+'</textarea></td>';
      });

      h += '<td style="padding:4px 6px;border:1px solid #FECACA;text-align:center;vertical-align:middle;background:#FEF2F2">';
      h += '<input value="'+manualTotal+'" placeholder="0"';
      h += ' style="width:36px;font-size:12px;font-weight:900;text-align:center;border:1px solid #FECACA;border-radius:4px;padding:3px 2px;background:transparent;outline:none;color:#DC2626"';
      h += ' onblur="W._rvTotal(\''+mKey+'\',\''+team.name+'\',\''+member+'\',this.value)">';
      h += '</td></tr>';
    });

    // 팀 구분선
    h += '<tr style="background:'+team.color+'0D"><td colspan="'+(WEEK_LABELS.length+3)+'" style="padding:3px 8px;border:1px solid #BFDBFE;border-left:3px solid '+team.color+'"></td></tr>';
  });

  h += '</tbody></table></div></div>';

  // 오른쪽 공지 패널 (수정 가능)
  var DEFAULT_NOTICE = [
    '***사업부 전체 공지***',
    '1. 기한 : 매 결산일 기준(1일~말일)',
    '2. 대상 : 사업부 전체 경력이상(신입, 초경력 제외)',
    '3. 포상 : [1등] 5만원 or 늦출권 1개',
    '4. 조건 : 최소조건 : 네이버 리뷰 3개 필수',
    '네이버리뷰 최소조건 3개이상이 달성되면 카카오나 구글, 지점홈페이지 리뷰도 횟수로 인정 O',
    '5. 네이버 리뷰 작성시 필수조건 : 영수증, 저장, 알림받기 설정'
  ].join('\n');
  // 공지는 전역 단일 키로 저장 — 달 무관하게 항상 같은 내용
  var noticeText = (RVSTAT.__notice !== undefined && RVSTAT.__notice !== null)
    ? RVSTAT.__notice : DEFAULT_NOTICE;
  var safeNotice = noticeText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h += '<div style="width:260px;flex-shrink:0;border-left:2px solid #FECACA;overflow-y:auto;padding:16px 14px;background:#FFF9F9">';
  h += '<div style="font-size:12px;font-weight:900;color:#DC2626;margin-bottom:8px;letter-spacing:.3px">&#128226; 사업부 전체 공지</div>';

  h += '<textarea id="rv-notice-ta" spellcheck="false" rows="18" onblur="W._rvNotice(this.dataset.mkey,this.value)" data-mkey="'+mKey+'"';
  h += ' style="width:100%;font-size:11px;line-height:1.8;padding:8px 10px;border:1px solid #FECACA;border-radius:7px;background:#fff;outline:none;resize:vertical;font-family:inherit;color:#374151;box-sizing:border-box">';
  h += safeNotice;
  h += '</textarea>';
  h += '</div>';
  h += '</div>';
  sc.innerHTML = h;
};

W._swLinks = () => {
  cw = 160; curMonth = 'current';
  ['nav-dash','nav-biz','nav-staff','nav-dep','nav-blog','nav-staff-alt','nav-links','nav-rvstat'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
  document.getElementById('nav-staff-sub')?.style && (document.getElementById('nav-staff-sub').style.display='none');
  document.getElementById('nav-biz-sub')?.style && (document.getElementById('nav-biz-sub').style.display='none');
  document.getElementById('nav-links')?.classList.add('on');
  renderTabs();
  showLinks();
};
W._swRvStat = () => {
  cw = 170; curMonth = 'current';
  // 모든 패널 명시적으로 숨기고 sc만 표시
  ['mc','bc','dc'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const sc=document.getElementById('sc'); if(sc)sc.style.display='';
  // 서브메뉴 닫기
  ['nav-staff-sub','nav-biz-sub','nav-dash-sub'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  ['nav-dash','nav-biz','nav-staff','nav-dep','nav-blog','nav-staff-alt','nav-links','nav-rvstat'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
  document.getElementById('nav-rvstat')?.classList.add('on');
  renderTabs();
  showRvStat();
};
// ── 리뷰 데이터 핸들러 ─────────────────────────────────
W._rvText = (mKey, team, member, wk, val) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey][team]) RVSTAT[mKey][team] = {};
  if (!RVSTAT[mKey][team][member]) RVSTAT[mKey][team][member] = {};
  const trimmed = val.trim();
  if (RVSTAT[mKey][team][member][wk] === trimmed) return;
  RVSTAT[mKey][team][member][wk] = trimmed;
  set(rRvStat, RVSTAT);
};
W._rvTotal = (mKey, team, member, val) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey][team]) RVSTAT[mKey][team] = {};
  if (!RVSTAT[mKey][team][member]) RVSTAT[mKey][team][member] = {};
  if (RVSTAT[mKey][team][member].__total === val.trim()) return;
  RVSTAT[mKey][team][member].__total = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvExRow = (wk, val) => {
  if (!RVSTAT['__exrow']) RVSTAT['__exrow'] = {rows:{}, total:''};
  if (!RVSTAT['__exrow'].rows) RVSTAT['__exrow'].rows = {};
  if (RVSTAT['__exrow'].rows[wk] === val.trim()) return;
  RVSTAT['__exrow'].rows[wk] = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvExTotal = (val) => {
  if (!RVSTAT['__exrow']) RVSTAT['__exrow'] = {rows:{}, total:''};
  if (RVSTAT['__exrow'].total === val.trim()) return;
  RVSTAT['__exrow'].total = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvNotice = (mKey, val) => {
  if (RVSTAT.__notice === val) return;
  RVSTAT.__notice = val;
  set(rRvStat, RVSTAT);
};
W._rvExampleText = (mKey, val) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey].__example) RVSTAT[mKey].__example = {text:'',imgs:[]};
  if (RVSTAT[mKey].__example.text === val.trim()) return;
  RVSTAT[mKey].__example.text = val.trim();
  set(rRvStat, RVSTAT);
};
W._rvExampleImg = (mKey, ii, val) => {
  if (!RVSTAT[mKey]?.__example) return;
  if (RVSTAT[mKey].__example.imgs[ii] === val.trim()) return;
  RVSTAT[mKey].__example.imgs[ii] = val.trim();
  set(rRvStat, RVSTAT).then(() => showRvStat());
};
W._rvExampleImgAdd = (mKey) => {
  if (!RVSTAT[mKey]) RVSTAT[mKey] = {};
  if (!RVSTAT[mKey].__example) RVSTAT[mKey].__example = {text:'',imgs:[]};
  RVSTAT[mKey].__example.imgs.push('');
  set(rRvStat, RVSTAT).then(() => showRvStat());
};
W._rvExampleImgDel = (mKey, ii) => {
  if (!RVSTAT[mKey]?.__example?.imgs) return;
  RVSTAT[mKey].__example.imgs.splice(ii, 1);
  set(rRvStat, RVSTAT).then(() => showRvStat());
};
W._linkAdd = () => {
  const nameEl = document.getElementById('lnk-name');
  const urlEl  = document.getElementById('lnk-url');
  const name = nameEl?.value.trim();
  const url  = urlEl?.value.trim();
  if (!name || !url) { alert('링크명과 URL을 모두 입력해주세요.'); return; }
  if (!url.startsWith('http')) { alert('URL은 http:// 또는 https://로 시작해야 합니다.'); return; }
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  arr.push({ name, url });
  LINKS = arr;
  set(rLinks, LINKS).then(() => showLinks());
};
W._linkEdit = (idx, field, val) => {
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  if (!arr[idx]) return;
  const trimmed = val.trim();
  if (arr[idx][field] === trimmed) return; // 변경 없으면 저장 안 함
  arr[idx] = { ...arr[idx], [field]: trimmed };
  LINKS = arr;
  set(rLinks, LINKS);
};
W._linkDel = (idx) => {
  if (!confirm('이 링크를 삭제할까요?')) return;
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  arr.splice(idx, 1);
  LINKS = arr;
  set(rLinks, LINKS).then(() => showLinks());
};

// ── 드래그 앤 드롭 순서 변경 ──────────────────────────
let _linkDragFrom = null;
W._linkDragStart = (e, idx) => {
  _linkDragFrom = idx;
  e.dataTransfer.effectAllowed = 'move';
  const tr = e.currentTarget.closest('tr');
  if (tr) { tr.classList.add('dragging'); tr.style.opacity = '0.4'; }
};
W._linkDragOver = (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const tr = e.currentTarget.closest('tr');
  if (tr) tr.style.background = '#EFF6FF';
};
W._linkDrop = (e, toIdx) => {
  e.preventDefault();
  if (_linkDragFrom === null || _linkDragFrom === toIdx) return;
  const arr = Array.isArray(LINKS) ? [...LINKS] : Object.values(LINKS || {});
  const [moved] = arr.splice(_linkDragFrom, 1);
  arr.splice(toIdx, 0, moved);
  LINKS = arr;
  set(rLinks, LINKS).then(() => showLinks());
  _linkDragFrom = null;
};
W._linkDragEnd = (e) => {
  _linkDragFrom = null;
  // 모든 행 스타일 초기화
  document.querySelectorAll('#lnk-tbody tr').forEach(tr => {
    tr.classList.remove('dragging');
    tr.style.opacity = '';
    tr.style.background = '';
  });
};
W._blogUrl = (wKey, member, dateStr, url, inputEl, idx=0) => {
  if (!BLOG[wKey]) BLOG[wKey] = {};
  if (!BLOG[wKey][member]) BLOG[wKey][member] = {};
  const now = new Date().toISOString();
  const dayData = BLOG[wKey][member][dateStr] || {};

  // urls 배열 확보 (구형 단일 객체 호환)
  let urls = Array.isArray(dayData.urls) ? [...dayData.urls]
           : (dayData.url ? [{ url: dayData.url, firstTime: dayData.firstTime||dayData.time, time: dayData.time }]
           : []);

  // 해당 idx 엔트리 업데이트 — prev를 먼저 복사해두고 isEdit 판단
  const prevEntry = urls[idx] ? { ...urls[idx] } : { url: '', firstTime: '', time: '' };
  if (!urls[idx]) urls[idx] = { url: '', firstTime: '', time: '' };
  const trimmed = url.trim();
  // 수정 여부: 이전에 저장된 url이 있고, 지금 입력값과 다를 때
  const isEdit = !!(prevEntry.url && prevEntry.url !== trimmed);

  // firstTime: 최초 저장 시각 — 한 번 기록되면 이후 덮어쓰지 않음
  const firstTime = trimmed ? (prevEntry.firstTime || now) : '';
  // time: 이번 저장 시각 (매번 갱신)
  const time = trimmed ? now : '';

  urls[idx] = { url: trimmed, firstTime, time };
  BLOG[wKey][member][dateStr] = { urls };
  set(rBlog, BLOG);

  // DOM 업데이트 (재렌더 없이)
  if (inputEl) {
    const valid = trimmed.startsWith('http');
    const fmt = t => { const dt=new Date(t); return (dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0'); };

    inputEl.style.borderColor = valid ? '#86EFAC' : 'var(--border)';
    inputEl.style.background = valid ? '#F0FDF4' : '#fff';

    // 시간 표시 업데이트
    const wrap = inputEl.parentElement;
    const timeDiv = wrap.querySelector('div[data-timedisp]');
    if (timeDiv) {
      if (time) {
        // isEdit: 실제 기존 값이 있고 바뀐 경우만 수정으로 표시
        const hasEdit = isEdit;
        let html = `<span style="color:#6B7280">입력 ${fmt(firstTime||time)}</span>`;
        if (hasEdit) html += `<span style="color:${valid?'#D97706':'#9CA3AF'}"> · 수정 ${fmt(time)}</span>`;
        timeDiv.innerHTML = html;
      } else { timeDiv.innerHTML = ''; }
    }

    // td 배경
    const td = inputEl.closest('td');
    if (td) {
      const allUrls = (BLOG[wKey]?.[member]?.[dateStr]?.urls || []);
      const tdValid = allUrls.some(u => u.url && u.url.startsWith('http'));
      td.style.background = tdValid ? '#F0FDF4' : '';
    }

    // 달성 셀 업데이트 — 방향3: 전체 유효 URL 총합
    const row = inputEl.closest('tr');
    if (row) {
      const achieveTd = row.querySelector('td[data-achieve]');
      if (achieveTd) {
        const mData = BLOG[wKey]?.[member] || {};
        let validCnt = 0;
        Object.values(mData).forEach(dv => {
          if (Array.isArray(dv.urls)) validCnt += dv.urls.filter(u=>u.url&&u.url.startsWith('http')).length;
          else if (dv.url && dv.url.startsWith('http')) validCnt++;
        });
        const req = achieveTd.dataset.req ? parseInt(achieveTd.dataset.req) : null;
        if (req) {
          const ok = validCnt >= req;
          achieveTd.innerHTML = `${validCnt}/${req}<br><span style="font-size:10px">${ok?'✓ 달성':'✗ 미달'}</span>`;
          achieveTd.style.color = ok ? '#16A34A' : '#DC2626';
          row.style.background = ok ? '' : '#FFF7F7';
        }
      }
    }
  }
};
// URL 수정 버튼 — 링크를 input으로 전환
W._blogUrlEdit = (wKey, member, dateStr, idx, btn) => {
  const linkEl = btn.previousElementSibling; // <a>
  if (!linkEl) return;
  const currentUrl = linkEl.href || '';
  const input = document.createElement('input');
  input.type = 'url';
  input.value = currentUrl;
  input.dataset.idx = idx;
  input.style.cssText = 'width:100%;font-size:10px;padding:3px 5px;border:1px solid #86EFAC;border-radius:4px;background:#fff';
  input.onchange = function() { W._blogUrl(wKey, member, dateStr, this.value, this, idx); };
  input.onblur = function() { if (this.value.trim().startsWith('http')) showBlog(); };
  // a + btn → input 으로 교체
  const wrap = linkEl.parentElement;
  wrap.innerHTML = '';
  wrap.appendChild(input);
  input.focus();
  input.select();
};
// URL 추가 버튼
W._blogUrlAdd = (wKey, member, dateStr) => {
  if (!BLOG[wKey]) BLOG[wKey] = {};
  if (!BLOG[wKey][member]) BLOG[wKey][member] = {};
  const dayData = BLOG[wKey][member][dateStr] || {};
  let urls = Array.isArray(dayData.urls) ? [...dayData.urls]
           : (dayData.url ? [{ url: dayData.url, firstTime: dayData.firstTime||dayData.time, time: dayData.time }]
           : []);
  urls.push({ url: '', firstTime: '', time: '' });
  BLOG[wKey][member][dateStr] = { urls };
  set(rBlog, BLOG);
  showBlog();
};
// URL 삭제 버튼
W._blogUrlDel = (wKey, member, dateStr, idx) => {
  if (!BLOG[wKey]?.[member]?.[dateStr]) return;
  const dayData = BLOG[wKey][member][dateStr];
  let urls = Array.isArray(dayData.urls) ? [...dayData.urls]
           : (dayData.url ? [{ url: dayData.url, firstTime: dayData.firstTime||dayData.time, time: dayData.time }]
           : []);
  urls.splice(idx, 1);
  BLOG[wKey][member][dateStr] = { urls };
  set(rBlog, BLOG);
  showBlog();
};
W._blogRole = (member, role) => {
  if (!BLOG.__roles) BLOG.__roles = {};
  BLOG.__roles[member] = role;
  set(rBlog, BLOG);
  showBlog();
};

window.W = W;

// 전역 에러 캐치
window.onerror = function(msg, src, line, col, err) {
  console.error('JS Error:', msg, 'line:', line, err);
  const mc = document.getElementById('mc');
  if (mc && mc.innerHTML === '') {
    mc.style.display = '';
    mc.innerHTML = `<div style="padding:20px;color:#DC2626;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">
      ⚠ 오류 발생: ${msg}<br>
      <span style="font-size:11px;font-weight:400">line ${line} — ${src}</span>
    </div>`;
  }
  return false;
};

try {
  cw=-1; renderTabs(); renderMain();
} catch(e) {
  console.error('Init error:', e);
  document.getElementById('mc').style.display='';
  document.getElementById('mc').innerHTML = `<div style="padding:20px;color:#DC2626;font-weight:700;background:#FEF2F2;border-radius:8px;margin:20px">
    ⚠ 초기화 오류: ${e.message}<br><pre style="font-size:11px;font-weight:400;white-space:pre-wrap">${e.stack}</pre>
  </div>`;
}
</script>
